name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pdo_mysql
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Prepare test env
        run: cp .env.example .env && php artisan key:generate

      - name: Unit + feature tests
        run: php artisan test

      # The golden-master suite (docs/10) is the deploy gate, but goldens
      # contain PII and never enter git — so it runs wherever the goldens
      # are mounted (locally, or a self-hosted/private-artifact runner
      # later). Hosted CI records that it was skipped.
      - name: Golden-master suite
        run: |
          if [ -d "$GOLDENS_PATH" ]; then
            php artisan goldens:verify
          else
            echo "::notice::Golden masters not available on this runner — suite skipped (see docs/10)."
          fi
        env:
          GOLDENS_PATH: ${{ vars.GOLDENS_PATH || '/opt/tai-goldens' }}
