# Dev/parity database matching the production target (MySQL 8, docs/09).
# SQLite remains the zero-setup default; run the golden gate against MySQL
# with:
#
#   docker compose up -d
#   DB_CONNECTION=mysql php artisan legacy:import
#   DB_CONNECTION=mysql php artisan goldens:verify
#
# Credentials are local-dev only.
services:
  mysql:
    image: mysql:8
    container_name: scoring-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ScoringLocal!2026
      MYSQL_DATABASE: scoring_engine
      MYSQL_USER: scoring
      MYSQL_PASSWORD: ScoringLocal!2026
    volumes:
      - scoring-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pScoringLocal!2026"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  scoring-mysql-data:
